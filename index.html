<script>
const API_BASE = "https://lecharchiv-api.virivkyonlinecz.workers.dev";
const SOURCES = {
  movies: { title: "🎬 Filmy", base: "https://movies.sosac.tv" },
  series: { title: "📺 Seriály", base: "https://tv.sosac.tv" }
};

const CATEGORIES = {
  movies: [
    {label:"Domov",path:"/cs/"},
    {label:"Najobľúbenejšie",path:"/cs/most-popular"},
    {label:"Novinky",path:"/cs/recently-added"},
    {label:"Akčné",path:"/cs/channel/action"},
    {label:"Dobrodružné",path:"/cs/channel/adventure"},
    {label:"Animované",path:"/cs/channel/animation"},
    {label:"Komédie",path:"/cs/channel/comedy"},
    {label:"Krimi",path:"/cs/channel/crime"},
    {label:"Dokumentárne",path:"/cs/channel/documentary"},
    {label:"Dráma",path:"/cs/channel/drama"},
    {label:"Fantasy",path:"/cs/channel/fantasy"},
    {label:"Horor",path:"/cs/channel/horror"},
    {label:"Romantické",path:"/cs/channel/romance"},
    {label:"Sci-Fi",path:"/cs/channel/sci-fi"},
    {label:"Thriller",path:"/cs/channel/thriller"}
  ],
  series: [
    {label:"Domov",path:"/cs/"},
    {label:"Najobľúbenejšie",path:"/cs/most-popular"},
    {label:"Novinky",path:"/cs/recently-added"},
    {label:"Akčné",path:"/cs/channel/action"},
    {label:"Dobrodružné",path:"/cs/channel/adventure"},
    {label:"Animované",path:"/cs/channel/animation"},
    {label:"Komédie",path:"/cs/channel/comedy"},
    {label:"Krimi",path:"/cs/channel/crime"},
    {label:"Dráma",path:"/cs/channel/drama"},
    {label:"Fantasy",path:"/cs/channel/fantasy"},
    {label:"Horor",path:"/cs/channel/horror"},
    {label:"Romantické",path:"/cs/channel/romance"},
    {label:"Sci-Fi",path:"/cs/channel/sci-fi"},
    {label:"Thriller",path:"/cs/channel/thriller"}
  ]
};

let state = {
  section: "movies",
  categoryPath: "/cs/",
  lastPlay: null,
  inSeriesDetail: false
};

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2600);
}

function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g,c=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[c]));
}

function clean(s){
  return String(s||"")
    .replace(/&amp;/g,"&")
    .replace(/&quot;/g,'"')
    .replace(/&#39;/g,"'")
    .replace(/&lt;/g,"<")
    .replace(/&gt;/g,">")
    .replace(/<script[\s\S]*?<\/script>/gi,"")
    .replace(/<style[\s\S]*?<\/style>/gi,"")
    .replace(/<[^>]+>/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function first(s,re){
  const m=re.exec(s||"");
  return m ? clean(m[1]) : "";
}

function attr(s,re){
  const m=re.exec(s||"");
  return m ? clean(m[1]) : "";
}

function absolute(u,base){
  try{return new URL(u,base).href}catch{return""}
}

function unwrapProxy(u){
  try{
    const x=new URL(u,API_BASE);
    if(x.pathname==="/proxy" && x.searchParams.get("url")){
      return x.searchParams.get("url");
    }
    return x.href;
  }catch{
    return u;
  }
}

function proxiedUrl(u){
  if(!u)return"";
  if(u.startsWith("/proxy?"))return API_BASE.replace(/\/$/,"")+u;
  return u;
}

function setTheme(theme){
  document.body.className="theme-"+theme;
  localStorage.setItem("lechplay_theme",theme);
  document.querySelectorAll(".dot").forEach(d=>{
    d.classList.toggle("active",d.dataset.theme===theme);
  });
}

document.querySelectorAll(".dot").forEach(d=>{
  d.onclick=()=>setTheme(d.dataset.theme);
});

setTheme(localStorage.getItem("lechplay_theme")||"purple");

async function api(path){
  const r=await fetch(API_BASE.replace(/\/$/,"")+path,{
    headers:{"accept":"application/json"}
  });
  if(!r.ok)throw new Error("API chyba "+r.status);
  const data=await r.json();
  if(data.error)throw new Error(data.message||"API chyba");
  return data;
}

async function fetchProxyText(url){
  const r=await fetch(API_BASE.replace(/\/$/,"")+"/proxy?url="+encodeURIComponent(url),{
    headers:{"accept":"text/html"}
  });
  if(!r.ok)throw new Error("Proxy chyba "+r.status);
  return await r.text();
}

function normalize(data){
  return Array.isArray(data) ? data : (data.items || data.results || []);
}

function sourceBase(){
  return SOURCES[state.section].base;
}

function categoryUrl(){
  return sourceBase()+state.categoryPath;
}

function titleFromUrl(url){
  try{
    const slug=decodeURIComponent(new URL(url).pathname.split("/").filter(Boolean).pop()||"");
    return slug
      .replace(/-\d{4}$/g,m=>" ("+m.slice(1)+")")
      .replace(/-/g," ")
      .replace(/\b\w/g,c=>c.toUpperCase());
  }catch{
    return "";
  }
}

function firstUrl(s,base,re){
  const m=re.exec(s||"");
  if(!m)return"";
  const raw=clean(m[1]);
  const abs=unwrapProxy(absolute(raw,base));
  if(raw.startsWith("/proxy?"))return proxiedUrl(raw);
  return abs;
}

function parseItemsFromHtml(html,baseUrl){
  const items=[];
  const text=html||"";
  const re=/<a\b[^>]*href=["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi;
  let m;

  while((m=re.exec(text))){
    const rawHref=m[1]||"";
    let url=unwrapProxy(absolute(rawHref,baseUrl));
    if(!url)continue;

    const isMovie = state.section==="movies" && url.includes("/cs/player/");
    const isSeries = state.section==="series" && url.includes("/cs/detail/");

    if(!isMovie && !isSeries)continue;

    const raw=m[2]||"";
    const after=text.slice(re.lastIndex,re.lastIndex+4000);
    const around=raw+after;

    let title =
      attr(raw,/alt=["']([^"']+)["']/i) ||
      attr(raw,/title=["']([^"']+)["']/i) ||
      clean(raw);

    if(!title || /^\d+$/.test(title) || /^(sledovat|sledovať|play|více zde|viac zde|\+)$/i.test(title)){
      title =
        first(after,/<h1[^>]*>([\s\S]*?)<\/h1>/i) ||
        first(after,/<h2[^>]*>([\s\S]*?)<\/h2>/i) ||
        first(after,/<h3[^>]*>([\s\S]*?)<\/h3>/i) ||
        titleFromUrl(url);
    }

    let image =
      firstUrl(around,baseUrl,/<img[^>]+(?:src|data-src)=["']([^"']+)["']/i) ||
      firstUrl(around,baseUrl,/(?:background-image|background)\s*:\s*url\(["']?([^"')]+)["']?\)/i);

    image=proxiedUrl(image);
    title=String(title||"").replace(/^\s*\d+\s+/,"").replace(/\s+/g," ").trim();

    if(!title || title==="Titulky" || title==="close")continue;
    if(/^(domů|filmy|tv|registrace|kontakt|spolupráce|kodi|přihlásit)$/i.test(title))continue;

    items.push({title,url,image,section:state.section});
  }

  const seen=new Set();
  return items.filter(it=>{
    if(!it.url || seen.has(it.url))return false;
    seen.add(it.url);
    return true;
  }).slice(0,120);
}

function parseEpisodesFromHtml(html,baseUrl){
  const episodes=[];
  const text=html||"";
  const re=/<a\b[^>]*href=["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi;
  let m;

  while((m=re.exec(text))){
    const rawHref=m[1]||"";
    const url=unwrapProxy(absolute(rawHref,baseUrl));

    if(!url || !url.includes("/cs/player/"))continue;

    const raw=m[2]||"";
    const after=text.slice(re.lastIndex,re.lastIndex+1800);

    let title =
      attr(raw,/title=["']([^"']+)["']/i) ||
      attr(raw,/alt=["']([^"']+)["']/i) ||
      clean(raw) ||
      first(after,/<h[1-4][^>]*>([\s\S]*?)<\/h[1-4]>/i) ||
      titleFromUrl(url);

    title=String(title||"Epizóda").replace(/\s+/g," ").trim();

    if(!title || /^(sledovať|sledovat|play|titulky|\+)$/i.test(title)){
      title=titleFromUrl(url)||"Epizóda";
    }

    episodes.push({
      title,
      url,
      image:"",
      section:"episode"
    });
  }

  const seen=new Set();
  return episodes.filter(it=>{
    if(!it.url || seen.has(it.url))return false;
    seen.add(it.url);
    return true;
  });
}

function renderCategories(){
  const row=document.getElementById("categoryRow");
  row.innerHTML="";

  for(const cat of CATEGORIES[state.section]||[]){
    const btn=document.createElement("button");
    btn.className="category-btn";
    btn.textContent=cat.label;
    btn.classList.toggle("active",cat.path===state.categoryPath);
    btn.onclick=()=>selectCategory(cat.path);
    row.appendChild(btn);
  }
}

function render(items){
  grid.innerHTML="";

  if(!items.length){
    empty.style.display="block";
    empty.textContent="Nič sa nenašlo.";
    return;
  }

  empty.style.display="none";

  for(const it of items){
    const el=document.createElement("article");
    el.className="item";

    const icon = state.section==="movies" ? "🎬" : "📺";
    const img = it.image ? `<img src="${escapeHtml(it.image)}" loading="lazy">` : icon;

    el.innerHTML=`
      <div class="poster">${img}</div>
      <div class="meta">
        <h4>${escapeHtml(it.title||"Bez názvu")}</h4>
      </div>
    `;

    el.onclick=()=>{
      if(state.section==="series" && !state.inSeriesDetail){
        openSeriesDetail(it);
      }else{
        playItem(it);
      }
    };

    grid.appendChild(el);
  }
}

function renderEpisodes(items){
  grid.innerHTML="";

  if(!items.length){
    empty.style.display="block";
    empty.textContent="Časti sa nenašli.";
    return;
  }

  empty.style.display="none";

  for(const it of items){
    const el=document.createElement("article");
    el.className="item";

    el.innerHTML=`
      <div class="poster">▶</div>
      <div class="meta">
        <h4>${escapeHtml(it.title||"Epizóda")}</h4>
      </div>
    `;

    el.onclick=()=>playItem(it);
    grid.appendChild(el);
  }
}

async function openSeriesDetail(it){
  try{
    state.inSeriesDetail=true;

    sectionTitle.textContent="📺 "+(it.title||"Seriál");
    empty.style.display="block";
    empty.textContent="Načítavam časti...";
    grid.innerHTML="";

    const html=await fetchProxyText(it.url);
    const episodes=parseEpisodesFromHtml(html,it.url);

    renderEpisodes(episodes);
  }catch(e){
    empty.style.display="block";
    empty.textContent=e.message;
    toast(e.message);
  }
}

async function selectSection(section){
  state.section=section;
  state.categoryPath="/cs/";
  state.inSeriesDetail=false;

  document.querySelectorAll(".section-card").forEach(x=>{
    x.classList.toggle("active",x.dataset.section===section);
  });

  sectionTitle.textContent=SOURCES[section].title;
  q.value="";
  renderCategories();
  await loadSection();
}

async function selectCategory(path){
  state.categoryPath=path;
  state.inSeriesDetail=false;
  q.value="";
  renderCategories();
  await loadSection();
}

async function loadSection(){
  try{
    state.inSeriesDetail=false;
    empty.style.display="block";
    empty.textContent="Načítavam...";
    grid.innerHTML="";

    const url=categoryUrl();
    let items=[];

    if(state.categoryPath==="/cs/"){
      const data=await api("/api/list?type="+encodeURIComponent(state.section));
      items=normalize(data);
    }else{
      const html=await fetchProxyText(url);
      items=parseItemsFromHtml(html,url);
    }

    sectionTitle.textContent=SOURCES[state.section].title;
    render(items);
  }catch(e){
    empty.style.display="block";
    empty.textContent=e.message;
    toast(e.message);
  }
}

async function doSearch(){
  const query=q.value.trim();

  if(!query)return loadSection();

  try{
    state.inSeriesDetail=false;
    empty.style.display="block";
    empty.textContent="Hľadám...";
    grid.innerHTML="";

    const data=await api(
      "/api/search?section="+encodeURIComponent(state.section)+"&q="+encodeURIComponent(query)
    );

    sectionTitle.textContent=SOURCES[state.section].title;
    render(normalize(data));
  }catch(e){
    empty.textContent=e.message;
    toast(e.message);
  }
}

function initPlayerLogo(){
  const wrap=document.getElementById("videoWrap");
  const logo=document.getElementById("lechplayLogo");

  if(!wrap || !logo)return;

  let timer;

  function showLogo(){
    logo.style.opacity="1";
    clearTimeout(timer);
    timer=setTimeout(()=>{logo.style.opacity="0"},2500);
  }

  wrap.addEventListener("mousemove",showLogo);
  wrap.addEventListener("touchstart",showLogo);
  wrap.addEventListener("click",showLogo);

  showLogo();
}

async function playItem(it){
  state.lastPlay=it;

  playerTitle.textContent=it.title||"Prehrávač";
  player.classList.add("active");
  playerBody.innerHTML='<div class="empty" style="margin:22px">Načítavam prehrávač...</div>';

  try{
    const data=await api("/api/play?url="+encodeURIComponent(it.url));

    if(data.videoUrl){
      playerBody.innerHTML=`
        <div class="video-wrap" id="videoWrap">
          <video controls autoplay playsinline src="${escapeHtml(data.videoUrl)}"></video>
          <div class="player-logo" id="lechplayLogo">▶ LechPlay</div>
        </div>
      `;
      initPlayerLogo();
      return;
    }

    if(data.embedUrl){
      playerBody.innerHTML=`
        <div class="video-wrap" id="videoWrap">
          <iframe class="playerframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" src="${escapeHtml(data.embedUrl)}"></iframe>
          <div class="player-logo" id="lechplayLogo">▶ LechPlay</div>
        </div>
      `;
      initPlayerLogo();
      return;
    }

    if(data.proxyUrl){
      playerBody.innerHTML=`
        <div class="video-wrap" id="videoWrap">
          <iframe class="playerframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" src="${escapeHtml(API_BASE.replace(/\/$/,"")+data.proxyUrl)}"></iframe>
          <div class="player-logo" id="lechplayLogo">▶ LechPlay</div>
        </div>
      `;
      initPlayerLogo();
      return;
    }

    playerBody.innerHTML='<div class="empty" style="margin:22px">Prehrávač sa nenašiel. Skús inú časť.</div>';
  }catch(e){
    playerBody.innerHTML='<div class="empty" style="margin:22px">'+escapeHtml(e.message)+'</div>';
    toast(e.message);
  }
}

closePlayer.onclick=()=>{
  player.classList.remove("active");
  playerBody.innerHTML="";
};

reloadPlayer.onclick=()=>{
  if(state.lastPlay)playItem(state.lastPlay);
};

searchBtn.onclick=doSearch;
refreshBtn.onclick=loadSection;

homeBtn.onclick=()=>{
  q.value="";
  loadSection();
};

q.addEventListener("keydown",e=>{
  if(e.key==="Enter")doSearch();
});

selectSection("movies");
</script>
