<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LechPlay</title>
<style>
body{margin:0;background:#070b18;color:#fff;font-family:sans-serif}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:20px}
.item{background:#111;padding:10px;border-radius:10px;cursor:pointer}
.player{position:fixed;inset:0;background:#000;display:none}
.player.active{display:block}
.player iframe{width:100%;height:100%;border:0}
</style>
</head>
<body>

<h2 style="padding:20px">LechPlay</h2>

<div id="grid" class="grid"></div>

<div id="player" class="player">
<button onclick="closePlayer()" style="position:absolute;z-index:10">Zavrieť</button>
<div id="playerBody"></div>
</div>

<script>
const API="https://lecharchiv-api.virivkyonlinecz.workers.dev";

async function load(){
  const r=await fetch(API+"/api/list?type=movies");
  const d=await r.json();
  const grid=document.getElementById("grid");

  d.items.forEach(it=>{
    const el=document.createElement("div");
    el.className="item";
    el.textContent=it.title;
    el.onclick=()=>play(it);
    grid.appendChild(el);
  });
}

async function play(it){
  const r=await fetch(API+"/api/play?url="+encodeURIComponent(it.url));
  const d=await r.json();

  // 🔥 HLAVNÝ FIX
  if(d.embedUrl){
    window.open(d.embedUrl,"_blank");
    return;
  }

  if(d.videoUrl){
    playerBody.innerHTML=`<video src="${d.videoUrl}" controls autoplay></video>`;
    player.classList.add("active");
  }
}

function closePlayer(){
  player.classList.remove("active");
  playerBody.innerHTML="";
}

load();
</script>

</body>
</html>
